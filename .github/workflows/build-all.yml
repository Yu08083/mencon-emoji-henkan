name: Build All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build-all
  cancel-in-progress: false

jobs:

  web:
    name: 🌐 Web → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage web files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.webmanifest _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp -r css _site/
          cp -r js _site/
          cp -r favicon _site/
          cp -r assets _site/
          if [ -d .well-known ]; then cp -r .well-known _site/; fi
          cp index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}

  android:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable (if exists)
        working-directory: ./android
        run: |
          if [ -f gradlew ]; then chmod +x gradlew; fi

      - name: Generate Gradle wrapper (if missing)
        working-directory: ./android
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.9 --distribution-type bin
            chmod +x gradlew
          fi

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true
        id: apk_build

      - name: Upload APK
        if: steps.apk_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: mencon-emoji-android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload build logs on failure
        if: steps.apk_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            android/app/build/reports/
            android/build/reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Fail job if APK build failed
        if: steps.apk_build.outcome == 'failure'
        run: |
          echo "::error::Android APK build failed. See logs and android-build-logs artifact."
          exit 1

  ios:
    name: 🍎 iOS Archive (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Check for Xcode project
        id: check_proj
        run: |
          if [ -f "ios/EmojiCode.xcodeproj/project.pbxproj" ] || [ -f "ios/EmojiCode.xcworkspace" ]; then
            echo "has_project=true" >> $GITHUB_OUTPUT
          else
            echo "has_project=false" >> $GITHUB_OUTPUT
            echo "::warning::ios/EmojiCode.xcodeproj が見つかりません。Xcodeでプロジェクトを生成してコミットする必要があります。ソースファイル一式は揃っているのでアーカイブはスキップします。"
          fi

      - name: Build iOS (no codesign)
        if: steps.check_proj.outputs.has_project == 'true'
        working-directory: ./ios
        run: |
          xcodebuild \
            -project EmojiCode.xcodeproj \
            -scheme EmojiCode \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Zip iOS source (always, for ad-hoc Xcode use)
        run: |
          cd ios
          zip -r ../mencon-emoji-ios-source.zip . -x "build/*" "*.xcuserdata/*"

      - name: Upload iOS source bundle
        uses: actions/upload-artifact@v4
        with:
          name: mencon-emoji-ios-source
          path: mencon-emoji-ios-source.zip
          retention-days: 90

      - name: Upload iOS build (if produced)
        if: steps.check_proj.outputs.has_project == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mencon-emoji-ios-build
          path: ios/build/Build/Products/Debug-iphonesimulator/EmojiCode.app
          retention-days: 30
          if-no-files-found: warn

  extension:
    name: 🧩 Browser Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          cd extension
          python3 -c "import json; json.load(open('manifest.json'))"
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "Extension version: $VERSION"
          echo "EXT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Stage extension files
        run: |
          mkdir -p _ext
          cp -r extension/* _ext/
          find _ext -name ".DS_Store" -delete
          find _ext -name "Thumbs.db" -delete

      - name: Create extension ZIP
        run: |
          cd _ext
          zip -r ../mencon-emoji-extension-v${{ env.EXT_VERSION }}.zip . -x "README.md"
          cd ..
          ls -la mencon-emoji-extension-v${{ env.EXT_VERSION }}.zip

      - name: Upload extension ZIP
        uses: actions/upload-artifact@v4
        with:
          name: mencon-emoji-extension-v${{ env.EXT_VERSION }}
          path: mencon-emoji-extension-v${{ env.EXT_VERSION }}.zip
          retention-days: 90

  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [web, android, ios, extension]
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "# 🎀 メンコン絵文字変換ツール ビルド結果"
            echo ""
            echo "| プラットフォーム | 状態 | 成果物 |"
            echo "|---|---|---|"
            echo "| 🌐 Web | ${{ needs.web.result }} | https://yu08083.github.io/mencon-emoji-henkan/ |"
            echo "| 📱 Android | ${{ needs.android.result }} | Artifacts から \`mencon-emoji-android-apk\` |"
            echo "| 🍎 iOS | ${{ needs.ios.result }} | Artifacts から \`mencon-emoji-ios-source\` |"
            echo "| 🧩 Extension | ${{ needs.extension.result }} | Artifacts から \`mencon-emoji-extension-*\` |"
            echo ""
            echo "## 📥 ダウンロード方法"
            echo ""
            echo "1. 上の **Summary** タブの一番下に **Artifacts** セクションがあります"
            echo "2. ファイル名をクリックでzipダウンロード"
          } >> $GITHUB_STEP_SUMMARY
